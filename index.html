<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCalc - Калькулятор</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">🖩 DevCalc</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Калькулятор</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html">Профіль</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Вхід</a></li>
                    <li class="nav-item"><a class="nav-link" href="register.html">Реєстрація</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-3 flex-grow-1 d-flex flex-column justify-content-center">
        <h2 class="text-center mb-3">Режим програміста</h2>
        <div class="calc-container">
            <div class="calc-display">0</div>
            <div class="hex-bin-panel">
                HEX: 0<br>DEC: 0<br>OCT: 0<br>BIN: 0
            </div>
            <div class="row g-2">
                <div class="col-3"><button class="btn btn-secondary calc-btn">A</button></div>
                <div class="col-3"><button class="btn btn-secondary calc-btn">B</button></div>
                <div class="col-3"><button class="btn btn-secondary calc-btn">C</button></div>
                <div class="col-3"><button class="btn btn-warning calc-btn">⌫</button></div>
                
                <div class="col-3"><button class="btn btn-secondary calc-btn">D</button></div>
                <div class="col-3"><button class="btn btn-secondary calc-btn">E</button></div>
                <div class="col-3"><button class="btn btn-secondary calc-btn">F</button></div>
                <div class="col-3"><button class="btn btn-danger calc-btn">CE</button></div>
                
                <div class="col-3"><button class="btn btn-light calc-btn">7</button></div>
                <div class="col-3"><button class="btn btn-light calc-btn">8</button></div>
                <div class="col-3"><button class="btn btn-light calc-btn">9</button></div>
                <div class="col-3"><button class="btn btn-info calc-btn">AND</button></div>
                
                <div class="col-3"><button class="btn btn-light calc-btn">4</button></div>
                <div class="col-3"><button class="btn btn-light calc-btn">5</button></div>
                <div class="col-3"><button class="btn btn-light calc-btn">6</button></div>
                <div class="col-3"><button class="btn btn-info calc-btn">OR</button></div>
                
                <div class="col-3"><button class="btn btn-light calc-btn">1</button></div>
                <div class="col-3"><button class="btn btn-light calc-btn">2</button></div>
                <div class="col-3"><button class="btn btn-light calc-btn">3</button></div>
                <div class="col-3"><button class="btn btn-info calc-btn">XOR</button></div>

                <div class="col-6"><button class="btn btn-light calc-btn">0</button></div>
                <div class="col-3"><button class="btn btn-primary calc-btn">=</button></div>
                <div class="col-3"><button class="btn btn-info calc-btn">NOT</button></div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container"><p class="mb-0">© 2026 DevCalc. Лабораторна №1.</p></div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
